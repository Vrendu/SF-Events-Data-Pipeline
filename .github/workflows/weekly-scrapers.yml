name: Weekly Event Scrapers

on:
  schedule:
    - cron: "0 6 * * 1"   # warfield         — Monday 6:00 AM UTC
    - cron: "5 6 * * 1"   # dothebay         — Monday 6:05 AM UTC
    - cron: "10 6 * * 1"  # sfrecpark        — Monday 6:10 AM UTC
    - cron: "15 6 * * 1"  # resident_advisor — Monday 6:15 AM UTC
    - cron: "20 6 * * 1"  # ticketmaster     — Monday 6:20 AM UTC
    - cron: "0 7 * * 1"   # prune            — Monday 7:00 AM UTC
  workflow_dispatch:

jobs:
  scrape-warfield:
    if: ${{ github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Warfield
        run: |
          curl -f -X POST "${{ secrets.SCRAPER_BASE_URL }}/scrape_events_warfield" \
            -H "X-API-Key: ${{ secrets.SCRAPER_API_KEY }}" \
            --max-time 120

  scrape-dothebay:
    if: ${{ github.event.schedule == '5 6 * * 1' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Scrape DoTheBay
        run: |
          curl -f -X POST "${{ secrets.SCRAPER_BASE_URL }}/scrape_events_dothebay" \
            -H "X-API-Key: ${{ secrets.SCRAPER_API_KEY }}" \
            --max-time 600

  scrape-sfrecpark:
    if: ${{ github.event.schedule == '10 6 * * 1' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Scrape SF Rec & Park
        run: |
          curl -f -X POST "${{ secrets.SCRAPER_BASE_URL }}/scrape_events_sfrecpark" \
            -H "X-API-Key: ${{ secrets.SCRAPER_API_KEY }}" \
            --max-time 600

  scrape-resident-advisor:
    if: ${{ github.event.schedule == '15 6 * * 1' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Resident Advisor
        run: |
          curl -f -X POST "${{ secrets.SCRAPER_BASE_URL }}/scrape_events_resident_advisor" \
            -H "X-API-Key: ${{ secrets.SCRAPER_API_KEY }}" \
            --max-time 600

  scrape-ticketmaster:
    if: ${{ github.event.schedule == '20 6 * * 1' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Ticketmaster
        run: |
          curl -f -X POST "${{ secrets.SCRAPER_BASE_URL }}/ticketmaster" \
            -H "X-API-Key: ${{ secrets.SCRAPER_API_KEY }}" \
            --max-time 300

  prune-old-events:
    if: ${{ github.event.schedule == '0 7 * * 1' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Prune events older than 2 weeks
        run: |
          curl -f -X DELETE "${{ secrets.SCRAPER_BASE_URL }}/events/prune_old" \
            -H "X-API-Key: ${{ secrets.READ_API_KEY }}" \
            --max-time 30
